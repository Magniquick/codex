name: rust-debug-build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Cargo build profile to use.
        type: choice
        default: debug
        options:
          - debug
          - release

jobs:
  build-linux:
    name: Build codex (${{ inputs.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev

      - name: Cache cargo state
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            codex-rs/target
          key: rust-debug-build-${{ runner.os }}-${{ inputs.profile }}-${{ hashFiles('codex-rs/Cargo.lock', 'codex-rs/rust-toolchain.toml') }}
          restore-keys: |
            rust-debug-build-${{ runner.os }}-${{ inputs.profile }}-
            rust-debug-build-${{ runner.os }}-

      - name: Build codex
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.profile }}" == "release" ]]; then
            cargo build --release --bin codex
            echo "artifact_path=target/release/codex" >> "$GITHUB_ENV"
          else
            cargo build --bin codex
            echo "artifact_path=target/debug/codex" >> "$GITHUB_ENV"
          fi

      - name: Show binary details
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "$artifact_path"
          file "$artifact_path"

      - name: Upload codex binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: codex-linux-${{ inputs.profile }}
          path: codex-rs/${{ env.artifact_path }}
          if-no-files-found: error
